shared_control_node:
  ros__parameters:
    # These values are kept in sync with the C++ declare_parameter() defaults.
    # The file is retained as an explicit reference/default parameter set.
    use_imu: true
    shared_torque_assist_enabled: false

    wheel_radius_m: 0.0855
    wheel_separation_m: 0.139
    left_wheel_sign: -1.0
    right_wheel_sign: 1.0
    odrive_velocity_is_turns_per_sec: true

    control_mode: 2  # ODrive ControlMode: 2 = VELOCITY_CONTROL（速度制御）
    input_mode: 1  # ODrive InputMode: 1 = PASSTHROUGH（input_vel をそのまま使用）
    request_closed_loop_on_startup: true

    observer_gain_x: 10.0
    observer_gain_z: 10.0
    robot_mass_x: 24.0
    robot_inertia_z: 2.2
    robot_damping_x: 40.0
    robot_damping_z: 5.0
    coulomb_friction_x: 8.0
    coulomb_friction_z: 0.8
    friction_smoothing_linear: 0.05
    friction_smoothing_angular: 0.05
    use_torque_estimate: true
    motor_torque_constant: 0.06

    use_gravity_compensation: true
    gravity_comp_gain: 1.0
    use_imu_linear_accel: false
    imu_accel_blend: 0.2

    desired_mass_x: 11.0
    desired_inertia_z: 0.9
    desired_damping_x: 24.0
    desired_damping_z: 2.8
    torque_assist_damping_x: 24.0
    torque_assist_damping_z: 2.8
    torque_assist_input_scale: 0.25
    torque_assist_torque_scale: 0.0
    torque_assist_max_force_forward: 20.0
    torque_assist_max_force_reverse: 45.0
    torque_assist_max_torque_z: 2.5
    torque_obstacle_stop_distance_m: 0.35
    torque_obstacle_pushback_stiffness: 70.0
    torque_obstacle_pushback_max_force: 22.5
    torque_obstacle_force_filter_alpha: 0.12
    torque_obstacle_brake_velocity_deadband: 0.03

    human_force_weight: 1.0
    autonomy_force_weight: 0.0
    autonomy_virtual_stiffness_x: 45.0
    autonomy_virtual_stiffness_z: 12.0
    autonomy_timeout_sec: 0.3
    human_force_x_sign: -1.0
    human_torque_z_sign: -1.0
    force_deadband_x: 4.0
    force_deadband_z: 1.2
    local_speed_delta_max_forward: 0.10
    local_speed_delta_max_reverse: 0.10
    local_speed_delta_gain: 0.20
    local_speed_delta_decay: 0.25
    push_pull_engage_threshold: 1.5
    push_pull_release_threshold: 0.75
    speed_event_hold_sec: 0.7
    speed_event_retrigger_sec: 1.0
    creep_speed_max: 0.08
    creep_force_threshold: 2.0
    speed_event_yaw_rate_threshold: 0.35
    speedup_min_tracking_ratio: 0.5

    loop_rate_hz: 100.0
    status_timeout_sec: 0.2
    cmd_vel_timeout_sec: 0.2
    axis_state_request_interval_sec: 0.5
    max_acc: 0.5
    max_dec: -0.5
    max_linear_velocity: 0.32
    max_linear_velocity_forward: 1.0
    max_linear_velocity_reverse: 0.3
    max_angular_velocity: 1.0
    max_linear_accel: 0.48
    max_linear_accel_forward: 0.5
    max_linear_accel_reverse: 0.5
    max_angular_accel: 1.50

    obstacle_guard_enabled: true
    obstacle_guard_reverse_enabled: false
    obstacle_stop_distance_m: 0.00
    obstacle_slowdown_margin_m: 0.60
    obstacle_min_speed_scale: 0.2
    obstacle_pushback_enabled: true
    obstacle_pushback_stiffness: 60.0
    obstacle_pushback_max_force: 30.0
    obstacle_timeout_sec: 0.3
    obstacle_point_min_z: -0.3
    obstacle_point_max_z: 1.2
    strict_frame_match: true
    sensor_guard_enabled: true
    sensor_guard_half_width_m: 0.35
